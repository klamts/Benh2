<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unit 4 – Health Vocabulary</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --sky:#38bdf8;--sky-d:#0284c7;--sky-bg:#e0f2fe;
  --lime:#84cc16;--lime-d:#65a30d;
  --orange:#fb923c;--orange-d:#ea580c;
  --yellow:#fbbf24;--purple:#a78bfa;--purple-d:#7c3aed;
  --green:#22c55e;--green-d:#15803d;
  --vn:#e11d48;--vn-bg:#fff1f2;
  --bg:#f0f9ff;--text:#1e293b;--muted:#64748b;--r:20px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Nunito",sans-serif;background:var(--bg);color:var(--text)}
.hero{background:linear-gradient(135deg,#0ea5e9 0%,#0369a1 55%,#1d4ed8 100%);
  color:#fff;padding:30px 24px 44px;text-align:center;position:relative;overflow:hidden}
.hero::after{content:"";position:absolute;bottom:-2px;left:0;right:0;height:28px;
  background:var(--bg);clip-path:ellipse(55% 100% at 50% 100%)}
.badge{display:inline-block;background:var(--yellow);color:#7c2d12;
  font-family:"Baloo 2",sans-serif;font-size:12px;font-weight:800;
  letter-spacing:1.2px;text-transform:uppercase;padding:3px 14px;border-radius:30px;margin-bottom:10px}
.hero h1{font-family:"Baloo 2",sans-serif;font-size:clamp(24px,5vw,42px);line-height:1.2}
.hero h1 span{color:var(--yellow)}
.hero p{font-size:13.5px;opacity:.9;margin-top:6px}
.floaty{font-size:24px;margin-top:10px;display:flex;justify-content:center;gap:14px}
.floaty span{animation:floatY 3s ease-in-out infinite;display:inline-block}
.floaty span:nth-child(2){animation-delay:.5s}
.floaty span:nth-child(3){animation-delay:1s}
.floaty span:nth-child(4){animation-delay:1.5s}
@keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.vn-bar{background:#fff;border-bottom:2px solid #fecdd3;
  padding:9px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.vn-bar-label{font-family:"Baloo 2",sans-serif;font-weight:800;font-size:14px;
  color:var(--vn);display:flex;align-items:center;gap:5px}
.sw{position:relative;width:46px;height:26px;flex-shrink:0}
.sw input{opacity:0;width:0;height:0}
.sw-track{position:absolute;inset:0;background:#cbd5e1;border-radius:30px;cursor:pointer;transition:.3s}
.sw-track:before{content:"";position:absolute;width:20px;height:20px;left:3px;bottom:3px;
  background:#fff;border-radius:50%;transition:.3s;box-shadow:0 1px 4px rgba(0,0,0,.2)}
input:checked+.sw-track{background:var(--vn)}
input:checked+.sw-track:before{transform:translateX(20px)}
.sw-lbl{font-size:13px;font-weight:700;color:var(--muted)}
.sw-lbl.on{color:var(--vn)}
.tabs{position:sticky;top:0;z-index:100;background:#fff;
  box-shadow:0 2px 12px rgba(0,0,0,.1);display:flex;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:14px 22px;border:none;background:none;
  font-family:"Baloo 2",sans-serif;font-size:15px;font-weight:700;color:var(--muted);
  cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;
  display:flex;align-items:center;gap:6px;white-space:nowrap}
.tab:hover{color:var(--sky-d);background:var(--sky-bg)}
.tab.active{color:var(--sky-d);border-bottom-color:var(--sky-d);background:var(--sky-bg)}
.sec{display:none;animation:fadeUp .3s ease}
.sec.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
/* play buttons */
.pbtn{flex-shrink:0;width:36px;height:36px;border-radius:50%;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .18s}
.pbtn svg{width:14px;height:14px;pointer-events:none}
.pbtn.sky{background:linear-gradient(135deg,var(--sky),var(--sky-d));color:#fff;box-shadow:0 3px 10px rgba(56,189,248,.4)}
.pbtn.sky:hover{transform:scale(1.15)}
.pbtn.grn{background:linear-gradient(135deg,var(--lime),var(--lime-d));color:#fff;box-shadow:0 3px 10px rgba(132,204,22,.4)}
.pbtn.grn:hover{transform:scale(1.15)}
.pbtn.pur{background:linear-gradient(135deg,var(--purple),var(--purple-d));color:#fff;box-shadow:0 3px 10px rgba(124,58,237,.4)}
.pbtn.pur:hover{transform:scale(1.15)}
.pbtn.em{background:linear-gradient(135deg,var(--green),var(--green-d));color:#fff;box-shadow:0 3px 10px rgba(34,197,94,.4)}
.pbtn.em:hover{transform:scale(1.15)}
.pbtn.playing{animation:pulse .6s infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.13)}}
/* passage */
.passage-wrap{max-width:820px;margin:28px auto;padding:0 20px 40px}
.sec-title{font-family:"Baloo 2",sans-serif;font-size:21px;font-weight:800;
  color:var(--sky-d);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.para-row{display:flex;align-items:flex-start;gap:12px;background:#fff;border-radius:14px;
  padding:14px 16px;margin-bottom:10px;box-shadow:0 2px 10px rgba(56,189,248,.12);
  border-left:4px solid var(--sky);transition:all .2s}
.para-row:hover{transform:translateX(4px);box-shadow:0 4px 18px rgba(56,189,248,.22)}
.para-num{background:var(--sky);color:#fff;font-family:"Baloo 2",sans-serif;font-weight:800;font-size:13px;
  width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.para-body{flex:1}
.para-en{font-size:15.5px;line-height:1.7;color:#334155}
.para-en strong{color:var(--sky-d);font-weight:800}
.para-vn{font-size:13px;color:var(--vn);font-weight:700;margin-top:5px;
  padding:5px 10px;background:var(--vn-bg);border-radius:8px;border-left:3px solid var(--vn);display:none}
.vn-on .para-vn{display:block}
/* vocab */
.vocab-wrap{max-width:980px;margin:0 auto;padding:28px 20px 48px}
.vocab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px}
.vcard{background:#fff;border-radius:var(--r);box-shadow:0 4px 20px rgba(0,0,0,.08);
  overflow:hidden;transition:transform .22s,box-shadow .22s;border:2.5px solid transparent}
.vcard:hover{transform:translateY(-6px);box-shadow:0 12px 36px rgba(56,189,248,.25);border-color:var(--sky)}
.vcard-top{display:flex}
.vcard-num{background:linear-gradient(180deg,var(--sky),var(--sky-d));color:#fff;
  font-family:"Baloo 2",sans-serif;font-weight:800;font-size:22px;
  width:50px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.vcard-img{flex:1;height:124px;overflow:hidden;background:var(--sky-bg)}
.vcard-img img{width:100%;height:100%;object-fit:cover;object-position:center top;display:block}
.vcard-body{padding:13px 15px 12px}
.vcard-row1{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap}
.vcard-word{font-family:"Baloo 2",sans-serif;font-size:18px;font-weight:800;color:var(--sky-d);flex:1;min-width:0}
.vcard-tag{font-size:12px;font-weight:800;color:var(--orange-d);
  background:#fff7ed;padding:3px 10px;border-radius:20px;border:1.5px solid #fed7aa;white-space:nowrap}
.vcard-ex-en{font-size:13.5px;color:#475569;line-height:1.6;font-style:italic;margin-bottom:4px}
.vcard-ex-en em{color:var(--sky-d);font-style:normal;font-weight:800}
.vcard-ex-vn{font-size:13px;color:var(--vn);font-weight:700;padding:5px 10px;
  background:var(--vn-bg);border-radius:8px;border-left:3px solid var(--vn);
  margin-bottom:8px;display:none}
.vn-on .vcard-ex-vn{display:block}
.vcard-btns{display:flex;gap:8px;margin-top:6px}
.vbtn{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;
  border:none;border-radius:30px;padding:8px 10px;
  font-family:"Nunito",sans-serif;font-weight:800;font-size:13px;cursor:pointer;transition:all .18s}
.vbtn.w{background:linear-gradient(135deg,var(--sky),var(--sky-d));color:#fff}
.vbtn.w:hover{opacity:.88;transform:scale(1.04)}
.vbtn.w.playing{background:linear-gradient(135deg,var(--green),var(--green-d))}
.vbtn.e{background:#f1f5f9;color:var(--sky-d);border:2px solid var(--sky-bg)}
.vbtn.e:hover{background:var(--sky-bg);border-color:var(--sky)}
.vbtn.e.playing{background:linear-gradient(135deg,var(--lime),var(--lime-d));color:#fff;border-color:transparent}
.vbtn svg{width:14px;height:14px;flex-shrink:0}
/* ask */
.ask-wrap{max-width:820px;margin:0 auto;padding:28px 20px 48px}
.ask-hint{font-size:13.5px;color:var(--muted);margin-bottom:20px}
.qa-grid{display:flex;flex-direction:column;gap:16px}
.qa-card{background:#fff;border-radius:18px;box-shadow:0 4px 18px rgba(0,0,0,.08);
  overflow:hidden;transition:transform .2s,box-shadow .2s}
.qa-card:hover{transform:translateY(-3px);box-shadow:0 8px 28px rgba(168,139,250,.25)}
.qa-bar{background:linear-gradient(90deg,var(--purple),var(--purple-d));color:#fff;
  font-family:"Baloo 2",sans-serif;font-weight:800;font-size:13px;
  padding:6px 16px;display:flex;align-items:center;gap:6px}
.qa-body{padding:14px 18px 16px;display:flex;flex-direction:column;gap:10px}
.qa-row{display:flex;align-items:flex-start;gap:10px}
.qa-side{flex:1;min-width:0;display:flex;flex-direction:column;gap:5px}
.qa-lbl{font-size:11px;font-weight:800;letter-spacing:1px;text-transform:uppercase;padding-top:11px;min-width:18px}
.qa-bubble{padding:10px 14px;font-size:15px;line-height:1.6;font-weight:700}
.q-row .qa-bubble{background:#f5f3ff;border:2px solid #e9d5ff;color:#5b21b6;border-radius:14px 14px 14px 4px}
.a-row .qa-bubble{background:#f0fdf4;border:2px solid #bbf7d0;color:var(--green-d);border-radius:14px 14px 4px 14px}
.qa-vn{font-size:12.5px;color:var(--vn);font-weight:700;padding:4px 10px;background:var(--vn-bg);border-radius:8px;display:none}
.vn-on .qa-vn{display:block}
.ans-hidden{filter:blur(6px);transition:filter .3s;cursor:pointer;user-select:none}
.ans-hidden:hover{filter:blur(3px)}
.reveal-tip{font-size:11px;color:var(--muted);text-align:right;margin-top:-2px}
footer{background:var(--sky-d);color:rgba(255,255,255,.8);text-align:center;padding:18px;font-size:13px}
footer strong{color:#fff}
@media(max-width:500px){.vocab-grid{grid-template-columns:1fr}.tab{padding:12px 14px;font-size:13px}}
</style>
</head>

/* ── Audio ── */
function smartPlay(path, text, btn) {
  if (btn) btn.classList.add('playing');
  const a = new Audio(path);
  let done = false;
  a.oncanplaythrough = () => {
    if (done) return; done = true;
    a.play().catch(() => tts(text, btn));
    a.onended = () => { if (btn) btn.classList.remove('playing'); };
  };
  a.onerror = () => { if (!done) { done = true; tts(text, btn); } };
  a.load();
  setTimeout(() => { if (!done && a.readyState < 3) { done = true; a.src = ''; tts(text, btn); } }, 600);
}

function tts(text, btn) {
  if (!window.speechSynthesis) { if (btn) btn.classList.remove('playing'); return; }
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US'; u.rate = 0.88;
  if (btn) { u.onend = () => btn.classList.remove('playing'); u.onerror = () => btn.classList.remove('playing'); }
  speechSynthesis.speak(u);
}

/* ── mkBtn helper: creates a play button, stores path+text as data ── */
function mkBtn(cls, path, text) {
  const b = document.createElement('button');
  b.className = 'pbtn ' + cls;
  b.innerHTML = PLAY_SVG;
  b.dataset.path = path;
  b.dataset.text = text;
  b.addEventListener('click', () => smartPlay(b.dataset.path, b.dataset.text, b));
  return b;
}

/* ── PASSAGE ── */
function buildPara() {
  const hl = ['germs','earache','headache','stomachache','toothache',
               'first-aid kit','thermometer','fever','bandages','medicine'];
  PARA.forEach(p => {
    let txt = p.text;
    hl.forEach(h => {
      txt = txt.replace(new RegExp('(' + h.replace(/-/g,'[-]') + ')','gi'), '<strong>$1</strong>');
    });
    const row = document.createElement('div');
    row.className = 'para-row';

    const num = document.createElement('div');
    num.className = 'para-num';
    num.textContent = p.id;

    const body = document.createElement('div');
    body.className = 'para-body';
    body.innerHTML = '<div class="para-en">' + txt + '</div>'
                   + '<div class="para-vn">&#x1F1FB;&#x1F1F3; ' + p.viet + '</div>';

    row.appendChild(num);
    row.appendChild(body);
    row.appendChild(mkBtn('sky', 'passage/' + p.id + '.wav', p.text));
    document.getElementById('paraList').appendChild(row);
  });
}

/* ── VOCABULARY ── */
function buildVocab() {
  const grid = document.getElementById('vocabGrid');
  VOCAB.forEach(v => {
    const kw = v.word.replace(/^(a|an)\s+/i, '').toLowerCase();
    const exHtml = v.example.replace(new RegExp('(' + kw + 's?)', 'gi'), '<em>$1</em>');

    const card = document.createElement('div');
    card.className = 'vcard';

    // top
    const top = document.createElement('div');
    top.className = 'vcard-top';
    const numDiv = document.createElement('div');
    numDiv.className = 'vcard-num';
    numDiv.textContent = v.id;
    const imgWrap = document.createElement('div');
    imgWrap.className = 'vcard-img';
    const img = document.createElement('img');
    img.src = 'images/' + v.id + '.jpg';
    img.alt = v.word;
    img.loading = 'lazy';
    img.onerror = function(){ this.style.display = 'none'; };
    imgWrap.appendChild(img);
    top.appendChild(numDiv);
    top.appendChild(imgWrap);

    // body
    const body = document.createElement('div');
    body.className = 'vcard-body';

    const row1 = document.createElement('div');
    row1.className = 'vcard-row1';
    row1.innerHTML =
      '<div class="vcard-word">' + v.word + '</div>' +
      '<div class="vcard-tag">&#x1F1FB;&#x1F1F3; ' + v.viet + '</div>';

    const exEn = document.createElement('div');
    exEn.className = 'vcard-ex-en';
    exEn.innerHTML = exHtml;

    const exVn = document.createElement('div');
    exVn.className = 'vcard-ex-vn';
    exVn.textContent = '🇻🇳 ' + v.exViet;

    // buttons
    const btns = document.createElement('div');
    btns.className = 'vcard-btns';

    const bWord = document.createElement('button');
    bWord.className = 'vbtn w';
    bWord.innerHTML = PLAY_SVG + ' &#x1F50A; Word';
    bWord.dataset.path = 'vocabulary/' + v.wordFile + '.wav';
    bWord.dataset.text = v.word;
    bWord.addEventListener('click', () => smartPlay(bWord.dataset.path, bWord.dataset.text, bWord));

    const bEx = document.createElement('button');
    bEx.className = 'vbtn e';
    bEx.innerHTML = CHAT_SVG + ' &#x1F4AC; Example';
    bEx.dataset.path = 'vocabulary/' + v.exampleFile + '.wav';
    bEx.dataset.text = v.example;
    bEx.addEventListener('click', () => smartPlay(bEx.dataset.path, bEx.dataset.text, bEx));

    btns.appendChild(bWord);
    btns.appendChild(bEx);
    body.appendChild(row1);
    body.appendChild(exEn);
    body.appendChild(exVn);
    body.appendChild(btns);
    card.appendChild(top);
    card.appendChild(body);
    grid.appendChild(card);
  });
}

/* ── ASK & ANSWER ── */
function buildQA() {
  const grid = document.getElementById('qaGrid');
  QA.forEach(item => {
    const card = document.createElement('div');
    card.className = 'qa-card';

    const bar = document.createElement('div');
    bar.className = 'qa-bar';
    bar.textContent = '💬 Pair ' + item.id;

    const body = document.createElement('div');
    body.className = 'qa-body';

    // Q row
    const qRow = document.createElement('div');
    qRow.className = 'qa-row q-row';
    const qLbl = document.createElement('div');
    qLbl.className = 'qa-lbl';
    qLbl.style.color = 'var(--purple-d)';
    qLbl.textContent = 'Q';
    const qSide = document.createElement('div');
    qSide.className = 'qa-side';
    const qBub = document.createElement('div');
    qBub.className = 'qa-bubble';
    qBub.textContent = item.q;
    const qVn = document.createElement('div');
    qVn.className = 'qa-vn';
    qVn.textContent = '🇻🇳 ' + item.qViet;
    qSide.appendChild(qBub);
    qSide.appendChild(qVn);
    qRow.appendChild(qLbl);
    qRow.appendChild(qSide);
    qRow.appendChild(mkBtn('pur', 'ask/' + item.qFile + '.wav', item.q));

    // A row
    const aRow = document.createElement('div');
    aRow.className = 'qa-row a-row';
    const aLbl = document.createElement('div');
    aLbl.className = 'qa-lbl';
    aLbl.style.color = 'var(--green-d)';
    aLbl.textContent = 'A';
    const aSide = document.createElement('div');
    aSide.className = 'qa-side';
    const aBub = document.createElement('div');
    aBub.className = 'qa-bubble ans-hidden';
    aBub.id = 'ans-' + item.id;
    aBub.textContent = item.a;
    const aVn = document.createElement('div');
    aVn.className = 'qa-vn ans-hidden';
    aVn.id = 'ans-vn-' + item.id;
    aVn.textContent = '🇻🇳 ' + item.aViet;
    aSide.appendChild(aBub);
    aSide.appendChild(aVn);

    const tip = document.createElement('div');
    tip.className = 'reveal-tip';
    tip.id = 'tip-' + item.id;
    tip.textContent = '👆 Tap the answer to reveal';

    // click to reveal
    [aBub, aVn].forEach(el => el.addEventListener('click', () => reveal(item.id)));

    aRow.appendChild(aLbl);
    aRow.appendChild(aSide);
    aRow.appendChild(mkBtn('em', 'ask/' + item.aFile + '.wav', item.a));

    body.appendChild(qRow);
    body.appendChild(aRow);
    body.appendChild(tip);
    card.appendChild(bar);
    card.appendChild(body);
    grid.appendChild(card);
  });
}

function reveal(id) {
  ['ans-' + id, 'ans-vn-' + id].forEach(k => {
    const el = document.getElementById(k);
    if (el) { el.classList.remove('ans-hidden'); el.style.cursor = 'default'; }
  });
  const tip = document.getElementById('tip-' + id);
  if (tip) tip.style.display = 'none';
}

/* ── VN toggle ── */
document.getElementById('vnToggle').addEventListener('change', function() {
  document.body.classList.toggle('vn-on', this.checked);
  const lbl = document.getElementById('swLbl');
  lbl.textContent = this.checked ? '🟢 Bật · Đang hiện nghĩa Tiếng Việt' : 'Tắt · Bật để hiện nghĩa Tiếng Việt';
  lbl.classList.toggle('on', this.checked);
});

/* ── Tabs ── */
document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', () => {
    const name = btn.dataset.tab;
    document.querySelectorAll('.sec').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
    document.getElementById('sec-' + name).classList.add('active');
    btn.classList.add('active');
    window.scrollTo({top: 0, behavior: 'smooth'});
  });
});

buildPara();
buildVocab();
buildQA();
</script>
</body>
</html>
